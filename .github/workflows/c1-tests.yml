name: C1 compiler tests

on:
  push:
    branches: [main]
    paths:
      - "Track-C/C1-compiler/**"
      - ".github/workflows/c1-tests.yml"
  pull_request:
    paths:
      - "Track-C/C1-compiler/**"
      - ".github/workflows/c1-tests.yml"

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Track-C/C1-compiler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependency
        run: python -m pip install --disable-pip-version-check pytest
      - name: Compile Python sources
        run: python -m compileall -q src compiler disassembler agent tests
      - name: Run full C1 test suite
        run: python -m pytest -q tests
      - name: PTX-02 CLI and objdump smoke
        run: |
          tmpdir="$(mktemp -d)"
          python compiler/aec-cc testcases/T2_scalar_optimization/kernel.ptx -O2 -o "$tmpdir/T2.aecbin" --report "$tmpdir/T2.json"
          python - "$tmpdir/T2.json" <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload["optimization"] == "O2"
          assert payload["pipeline"] == "O2-conservative-scalar"
          assert payload["metrics"]["machine_instruction_count"] > 0
          PY
          python disassembler/aec-objdump "$tmpdir/T2.aecbin" > "$tmpdir/T2.objdump"
          tail -n 1 "$tmpdir/T2.objdump" | grep -q 'HALT'
      - name: Repository hygiene
        working-directory: .
        run: |
          if git ls-files | grep -E '(^|/)(__pycache__|\.pytest_cache)(/|$)|\.py[co]$'; then
            echo "Tracked Python cache artifact found" >&2
            exit 1
          fi
          git diff --check
          git diff --exit-code
