name: Compiler tests

on:
  push:
    branches: [main]
    paths:
      - "compiler/**"
      - "src/**"
      - "tests/**"
      - "testcases/**"
      - "disassembler/**"
      - "aec-cmodel/**"
      - "docs/**"
      - "*.md"
      - "pytest.ini"
      - ".github/workflows/c1-tests.yml"
  pull_request:
    paths:
      - "compiler/**"
      - "src/**"
      - "tests/**"
      - "testcases/**"
      - "disassembler/**"
      - "aec-cmodel/**"
      - "docs/**"
      - "*.md"
      - "pytest.ini"
      - ".github/workflows/c1-tests.yml"

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependency
        run: python -m pip install --disable-pip-version-check pytest
      - name: Ensure bundled tools are executable
        if: runner.os == 'Linux'
        run: chmod +x compiler/aec-cc disassembler/aec-objdump aec-cmodel/bin/aec-precise-linux-x86_64
      - name: Compile Python sources
        run: python -m compileall -q src compiler disassembler tests
      - name: Run full test suite
        run: python -m pytest -q tests
      - name: CLI and objdump smoke
        run: |
          tmpdir="$(mktemp -d)"
          python compiler/aec-cc testcases/T2_scalar_optimization/kernel.ptx -O2 -o "$tmpdir/T2.aecbin" --report "$tmpdir/T2.json"
          python - "$tmpdir/T2.json" <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload["optimization"] == "O2"
          assert payload["pipeline"] == "O2-conservative-scalar"
          assert payload["metrics"]["machine_instruction_count"] > 0
          PY
          python disassembler/aec-objdump "$tmpdir/T2.aecbin" > "$tmpdir/T2.objdump"
          tail -n 1 "$tmpdir/T2.objdump" | grep -q 'HALT'
      - name: Formal entry-point smoke (T1)
        run: |
          chmod +x compiler/aec-cc
          tmpdir="$(mktemp -d)"
          ./compiler/aec-cc testcases/T1_basic_lowering/kernel.ptx -O2 -o "$tmpdir/T1.aecbin" --report "$tmpdir/T1.json"
          test -f "$tmpdir/T1.aecbin" || { echo "FAIL: no aecbin output"; exit 1; }
          test -s "$tmpdir/T1.aecbin" || { echo "FAIL: empty aecbin"; exit 1; }
          test $(( $(stat -c%s "$tmpdir/T1.aecbin") % 16 )) -eq 0 || { echo "FAIL: aecbin not 16-byte multiple"; exit 1; }
          python3 -c "
          import json
          r = json.load(open('$tmpdir/T1.json'))
          assert r['status'] == 'ok', f'status not ok: {r.get(\"status\")}'
          assert r['opt_level'] == 'O2', f'opt_level not O2: {r.get(\"opt_level\")}'
          assert r['num_aec_instructions'] > 0, 'zero instructions'
          "
      - name: CModel smoke (T1-T5 via aec-precise)
        if: runner.os == 'Linux'
        run: |
          chmod +x aec-cmodel/bin/aec-precise-linux-x86_64
          python -m pytest -q tests/test_cmodel.py -v
      - name: Repository hygiene
        run: |
          if git ls-files | grep -E '(^|/)(__pycache__|\.pytest_cache)(/|$)|\.py[co]$'; then
            echo "Tracked Python cache artifact found" >&2
            exit 1
          fi
          git diff --check
          git diff --exit-code
